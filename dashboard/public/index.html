<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Zerodha Kite</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <!-- Pre-mount loading screen (rendered instantly, replaced by React) -->
      <div class="pre-loader-container">
        <style>
          .pre-loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #f8fafc 0%, #f1f5f9 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #334155;
            z-index: 99999;
            overflow: hidden;
          }

          .pre-loader-container::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.04) 0%, rgba(255, 255, 255, 0) 70%);
            filter: blur(80px);
            animation: floatLight 12s infinite ease-in-out;
            pointer-events: none;
          }

          .pre-loader-container::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.03) 0%, rgba(255, 255, 255, 0) 70%);
            filter: blur(80px);
            animation: floatLight 15s infinite ease-in-out reverse;
            pointer-events: none;
          }

          .pre-loader-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            width: 420px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 
                        0 8px 10px -6px rgba(0, 0, 0, 0.05);
            z-index: 10;
            text-align: center;
            box-sizing: border-box;
            animation: preFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
          }

          .pre-logo-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: rgba(59, 130, 246, 0.08);
            border-radius: 16px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            margin-bottom: 24px;
            animation: prePulseGlow 3s infinite ease-in-out;
          }

          .pre-title {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #0f172a;
            margin: 0 0 6px 0;
            text-transform: uppercase;
          }

          .pre-subtitle {
            font-size: 0.85rem;
            color: #64748b;
            margin: 0 0 32px 0;
          }

          .spinner-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 32px auto;
            display: flex;
            align-items: center;
            justify-content: center;
          }

          .pre-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-top: 3px solid #3b82f6;
            border-right: 3px solid #10b981;
            border-radius: 50%;
            animation: preRotateSpinner 1s cubic-bezier(0.4, 0.1, 0.3, 0.9) infinite;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
          }

          .pre-spinner-inner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(16, 185, 129, 0.05);
            border-bottom: 3px solid #10b981;
            border-left: 3px solid #3b82f6;
            border-radius: 50%;
            animation: preRotateSpinnerReverse 1.5s cubic-bezier(0.4, 0.1, 0.3, 0.9) infinite;
          }

          .loading-text {
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
            letter-spacing: 0.02em;
          }

          .loading-subtext {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 0;
            animation: prePulseText 2s infinite ease-in-out;
          }

          @keyframes floatLight {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, -20px) scale(1.08); }
          }

          @keyframes prePulseGlow {
            0%, 100% { 
              box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
              border-color: rgba(59, 130, 246, 0.2);
            }
            50% { 
              box-shadow: 0 0 30px rgba(59, 130, 246, 0.35);
              border-color: rgba(59, 130, 246, 0.5);
            }
          }

          @keyframes preFadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
          }

          @keyframes preRotateSpinner {
            100% { transform: rotate(360deg); }
          }

          @keyframes preRotateSpinnerReverse {
            100% { transform: rotate(-360deg); }
          }

          @keyframes prePulseText {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
          }

          @media (max-width: 480px) {
            .pre-loader-card {
              width: 90%;
              padding: 24px;
              border-radius: 16px;
            }
          }
        </style>

        <div class="pre-loader-card">
          <div class="pre-logo-container">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2L4 10L12 18L20 10L12 2Z" fill="url(#preLogoGrad)" />
              <path d="M12 10L12 22" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
              <path d="M8 14H16" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
              <defs>
                <linearGradient id="preLogoGrad" x1="4" y1="2" x2="20" y2="18" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stop-color="#3b82f6" />
                  <stop offset="100%" stop-color="#10b981" />
                </linearGradient>
              </defs>
            </svg>
          </div>
          <h1 class="pre-title">Kite Console</h1>
          <p class="pre-subtitle">Secure Access Gateway</p>

          <div class="spinner-container">
            <div class="pre-spinner"></div>
            <div class="pre-spinner-inner"></div>
          </div>

          <div class="loading-text">Loading Console...</div>
          <div class="loading-subtext">Verifying your security credentials</div>
        </div>
      </div>
    </div>

  </body>
</html>
